<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinted Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
    h1 { color: #09B1BA; }
    input { width: 70%; padding: 10px; font-size: 16px; border: 2px solid #ddd; border-radius: 5px; }
    button { padding: 10px 20px; background: #09B1BA; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
    button:hover { background: #078a91; }
    #results { margin-top: 30px; padding: 20px; background: #f5f5f5; border-radius: 10px; display: none; }
    .stat { font-size: 20px; margin: 10px 0; }
    .stat span { font-weight: bold; color: #09B1BA; }
    #loading { display: none; color: #999; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>🔍 Vinted Tracker</h1>
  <p>Analyse les prix en temps réel sur Vinted</p>

  <input type="text" id="searchInput" placeholder="Ex: nike air force 1..." />
  <button onclick="search()">Analyser</button>

  <div id="loading">⏳ Analyse en cours...</div>

  <div id="results">
    <h2 id="resultTitle"></h2>
    <div class="stat">📦 Annonces trouvées : <span id="count"></span></div>
    <div class="stat">💰 Prix moyen : <span id="avgPrice"></span> €</div>
    <div class="stat">📉 Prix minimum : <span id="minPrice"></span> €</div>
    <div class="stat">📈 Prix maximum : <span id="maxPrice"></span> €</div>
  </div>

  <script>
    function search() {
      const query = document.getElementById('searchInput').value;
      if (!query) return;

      document.getElementById('loading').style.display = 'block';
      document.getElementById('results').style.display = 'none';

      fetch('/search?q=' + encodeURIComponent(query))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          document.getElementById('loading').style.display = 'none';
          if (data.error) {
            alert('Erreur : ' + data.error);
            return;
          }
          document.getElementById('resultTitle').textContent = 'Résultats pour : ' + data.query;
          document.getElementById('count').textContent = data.count;
          document.getElementById('avgPrice').textContent = data.avgPrice;
          document.getElementById('minPrice').textContent = data.minPrice;
          document.getElementById('maxPrice').textContent = data.maxPrice;
          document.getElementById('results').style.display = 'block';
        });
    }

    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
